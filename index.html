<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mar Bouquet</title>
    <style>
        /* Base page styling */
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1a0000 0%, #00001a 100%); /* Deep dark red to deep dark blue */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        /* Central "mar" text styling and animation */
        .center-text {
            font-size: 8rem;
            color: #ffffff;
            text-transform: lowercase;
            letter-spacing: 8px;
            /* Glowing effect mixing dark red and blue */
            text-shadow: 0 0 20px #8b0000, 0 0 40px #00008b, 0 0 60px #8b0000;
            animation: floatText 4s ease-in-out infinite;
            z-index: 10;
        }

        /* Gentle up-and-down floating animation for the text */
        @keyframes floatText {
            0%, 100% { 
                transform: translateY(0); 
                text-shadow: 0 0 20px #8b0000, 0 0 40px #00008b; 
            }
            50% { 
                transform: translateY(-15px); 
                text-shadow: 0 0 30px #b30000, 0 0 50px #0000b3; /* Glow intensifies slightly */
            }
        }

        /* Stylized abstract petals */
        .petal {
            position: absolute;
            border-radius: 50% 0 50% 0; /* Leaf/petal shape */
            opacity: 0.6;
            animation: fall linear infinite;
            z-index: 1;
        }

        /* Falling animation for the petals */
        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(0.8);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(110vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Central Word -->
    <div class="center-text">mar</div>

    <!-- Script to generate the animated bouquet petals -->
    <script>
        function createBouquet() {
            // Dark red and dark blue hex codes
            const colors = ['#8b0000', '#00008b', '#5c0000', '#00005c']; 
            const petalCount = 45; // Number of floating elements

            for (let i = 0; i < petalCount; i++) {
                let petal = document.createElement('div');
                petal.classList.add('petal');
                
                // Randomize size, position, speed, and color
                let size = Math.random() * 25 + 10; // Between 10px and 35px
                let leftPos = Math.random() * 100; // Spread horizontally across the screen
                let fallDuration = Math.random() * 12 + 6; // Fall takes between 6s and 18s
                let startDelay = Math.random() * 10; // Random start time
                let petalColor = colors[Math.floor(Math.random() * colors.length)];

                // Apply the randomized styles
                petal.style.width = `${size}px`;
                petal.style.height = `${size}px`;
                petal.style.left = `${leftPos}vw`;
                petal.style.background = petalColor;
                petal.style.boxShadow = `0 0 15px ${petalColor}`; // Add a slight glow to each petal
                petal.style.animationDuration = `${fallDuration}s`;
                petal.style.animationDelay = `${startDelay}s`;

                document.body.appendChild(petal);
            }
        }

        // Initialize the animation
        createBouquet();
    </script>
</body>
</html>
